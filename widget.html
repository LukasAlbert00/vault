<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060401">
<title>The Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100vw;height:100vh;height:100dvh;
  overflow:hidden;
  background:#060401;
  display:flex;align-items:center;justify-content:center;
}

.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 110%, rgba(180,120,30,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 20%, rgba(180,120,30,0.07) 0%, transparent 60%),
    #060401;
}

.card{
  position:relative;z-index:1;
  width:min(340px, 92vw);
  padding:32px 28px 28px;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

/* TOP LABEL */
.top-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:3px;
  color:rgba(201,150,58,0.6);
  text-transform:uppercase;
  margin-bottom:28px;
  text-align:center;
}

/* RING */
.ring-container{
  position:relative;
  width:200px;height:200px;
  margin-bottom:32px;
}
.ring-svg{
  width:200px;height:200px;
  transform:rotate(-90deg);
}
.ring-bg{
  fill:none;
  stroke:rgba(255,255,255,0.04);
  stroke-width:8;
}
.ring-glow{
  fill:none;
  stroke:rgba(201,150,58,0.08);
  stroke-width:14;
  stroke-linecap:round;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.ring-main{
  fill:none;
  stroke:url(#g1);
  stroke-width:8;
  stroke-linecap:round;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.ring-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2px;
}
.ring-pct{
  font-family:'JetBrains Mono',monospace;
  font-size:42px;font-weight:700;
  background:linear-gradient(160deg,#E8C06A 0%,#C9963A 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
.ring-pct-sym{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:400;
  color:rgba(201,150,58,0.5);
  line-height:1;
}
.ring-days{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:rgba(201,150,58,0.4);
  letter-spacing:1px;
  margin-top:2px;
}

/* SAVED AMOUNT */
.saved-wrap{
  text-align:center;
  margin-bottom:6px;
}
.saved-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:2px;
  color:rgba(255,255,255,0.2);
  text-transform:uppercase;
  margin-bottom:8px;
}
.saved-amount{
  font-family:'Playfair Display',serif;
  font-weight:900;
  font-size:52px;
  line-height:1;
  background:linear-gradient(160deg,#FFFFFF 0%,#E8C06A 50%,#C9963A 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-1px;
}
.saved-unit{
  font-family:'JetBrains Mono',monospace;
  font-size:20px;font-weight:400;
  color:rgba(201,150,58,0.6);
  margin-left:4px;
  vertical-align:super;
  font-size:16px;
}
.saved-remaining{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:rgba(255,255,255,0.18);
  margin-top:6px;
  letter-spacing:0.5px;
}

/* DIVIDER */
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,150,58,0.2),transparent);
  margin:24px 0;
}

/* MACHINE NAME */
.machine{
  text-align:center;
  margin-bottom:24px;
}
.machine-name{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:22px;
  color:rgba(232,192,106,0.85);
  letter-spacing:0.3px;
  line-height:1.2;
}
.machine-brand{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:2.5px;
  color:rgba(201,150,58,0.35);
  text-transform:uppercase;
  margin-top:4px;
}

/* MOTIVATION */
.motivation{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:rgba(255,255,255,0.25);
  text-align:center;
  letter-spacing:0.3px;
  line-height:1.6;
  padding:0 8px;
  min-height:36px;
}

/* OPEN BUTTON */
.open-btn{
  margin-top:28px;
  width:100%;
  background:rgba(201,150,58,0.1);
  border:1px solid rgba(201,150,58,0.2);
  border-radius:16px;
  padding:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:2px;
  color:rgba(201,150,58,0.6);
  text-transform:uppercase;
  text-align:center;
  cursor:pointer;
  text-decoration:none;
  display:block;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.open-btn:active{
  background:rgba(201,150,58,0.18);
  color:rgba(201,150,58,0.9);
}

/* PARTICLES */
.particles{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:1px;height:1px;
  background:rgba(201,150,58,0.4);
  border-radius:50%;
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:0.3;}
  100%{transform:translateY(-20px) scale(1.5);opacity:0;}
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="particles" id="particles"></div>

<div class="card">
  <div class="top-label">Din opsparing · The Vault</div>

  <div class="ring-container">
    <svg class="ring-svg" viewBox="0 0 200 200">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#C9963A"/>
          <stop offset="50%" stop-color="#E8C06A"/>
          <stop offset="100%" stop-color="#C9963A"/>
        </linearGradient>
      </defs>
      <circle class="ring-bg" cx="100" cy="100" r="84"/>
      <circle class="ring-glow" id="ring-glow" cx="100" cy="100" r="84"
        stroke-dasharray="527.8" stroke-dashoffset="527.8"/>
      <circle class="ring-main" id="ring-main" cx="100" cy="100" r="84"
        stroke-dasharray="527.8" stroke-dashoffset="527.8"/>
    </svg>
    <div class="ring-center">
      <div style="display:flex;align-items:flex-start;gap:1px;">
        <div class="ring-pct" id="ring-pct">0</div>
        <div class="ring-pct-sym">%</div>
      </div>
      <div class="ring-days" id="ring-days">dag 0</div>
    </div>
  </div>

  <div class="saved-wrap">
    <div class="saved-label">Sparet op</div>
    <div>
      <span class="saved-amount" id="saved-amt">0</span><span class="saved-unit">kr.</span>
    </div>
    <div class="saved-remaining" id="saved-rem">40.000 kr. tilbage</div>
  </div>

  <div class="divider"></div>

  <div class="machine">
    <div class="machine-name">Linea Mini R</div>
    <div class="machine-brand">La Marzocco · Espresso Machine</div>
  </div>

  <div class="motivation" id="motivation">Rejsen starter her ☕</div>

  <a class="open-btn" href="./index.html">Åbn The Vault →</a>
</div>

<script>
const GOAL = 40000;
const CIRC = 2 * Math.PI * 84;

const quotes = [
  'Hver krone tæller. Bliv ved.',
  'Den dufter allerede af espresso ☕',
  'Du er stærkere end din tegnebog.',
  'Drømmene koster — men de er det værd.',
  'Hvert skip er et skridt tættere.',
  'Disciplin i dag. Espresso i morgen.',
  'Den venter på dig. Bliv ved.',
  'Kvalitet tager tid. Du gør det rigtigt.',
];

function fmt(n) {
  return Math.round(n).toLocaleString('da-DK');
}

function load() {
  let saved = 0, streak = 0;
  try {
    const raw = localStorage.getItem('vault-state');
    if (raw) {
      const s = JSON.parse(raw);
      saved = s.saved || 0;
      streak = s.streak || 0;
    }
  } catch(e) {}

  const pct = Math.min(100, (saved / GOAL) * 100);
  const offset = CIRC - (pct / 100) * CIRC;

  document.getElementById('ring-pct').textContent = pct.toFixed(pct < 10 ? 1 : 0);
  document.getElementById('ring-main').style.strokeDashoffset = offset;
  document.getElementById('ring-glow').style.strokeDashoffset = offset;
  document.getElementById('ring-days').textContent = 'dag ' + streak;
  document.getElementById('saved-amt').textContent = fmt(saved);
  document.getElementById('saved-rem').textContent = fmt(Math.max(0, GOAL - saved)) + ' kr. tilbage';

  const msg =
    pct < 1   ? 'Rejsen starter her ☕' :
    pct < 10  ? 'Godt begyndt — bliv ved! 💪' :
    pct < 25  ? 'Solid fremgang. Du gør det.' :
    pct < 50  ? 'Halvvejs! Du kan mærke det 🔥' :
    pct < 75  ? 'Mere end halvt! Standhaftig!' :
    pct < 90  ? 'Næsten der — stå fast!!' :
    pct < 100 ? 'SNART!! Giv ikke op nu!!! 🚀' :
                'GÅ KØB DEN NU!! 🎉☕';
  document.getElementById('motivation').textContent = msg;

  // random daily quote underneath
  const dayQuote = quotes[new Date().getDay() % quotes.length];
  document.getElementById('motivation').textContent = pct >= 1 ? msg : dayQuote;
}

// particles
function makeParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 12 + 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = Math.random() * 0.5;
    container.appendChild(p);
  }
}

// auto-refresh every 30 seconds
load();
makeParticles();
setInterval(load, 30000);
</script>
</body>
</html>
